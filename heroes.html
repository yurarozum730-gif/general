<!DOCTYPE html>
<html lang="uk" id="page-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-ua="Герої | Dota 2 Universe" data-en="Heroes | Dota 2 Universe">Герої | Dota 2 Universe</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- АНІМАЦІЇ --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- БАЗОВІ СТИЛІ --- */
        .search-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        #hero-search {
            padding: 12px 20px;
            width: 300px;
            background: #1c2127;
            border: 2px solid #444;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #hero-search:focus {
            width: 450px;
            border-color: #a42323;
            background: #252a30;
            box-shadow: 0 0 20px rgba(164, 35, 35, 0.4);
        }

        .filter-nav {
            margin-bottom: 30px;
            text-align: center;
            background: rgba(22, 25, 29, 0.9);
            padding: 20px;
            border-radius: 8px;
            border-bottom: 2px solid #a42323;
        }

        .filter-btn {
            background: #2a2f36;
            color: white;
            border: 1px solid #444;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #a42323;
            border-color: #ffb400;
            transform: translateY(-2px);
        }

        .heroes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .hero-link {
            text-decoration: none;
            color: inherit;
            display: block;
            opacity: 0; 
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .hero-card-item {
            background: #1c2127;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .hero-card-item:hover {
            border-color: #ffb400;
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(164, 35, 35, 0.3);
            z-index: 10;
        }

        .hero-card-item img.hero-portrait {
            width: 100%;
            display: block;
            transition: filter 0.3s ease;
        }

        .hero-card-item:hover img.hero-portrait {
            filter: brightness(1.2);
        }

        .hero-info {
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
        }

        .attr-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .hero-card-item:hover .attr-icon {
            transform: rotate(360deg);
        }

        .hero-name {
            font-weight: bold;
            color: #f1f1f1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Елементи перемикача мов */
        .lang-switcher {
            display: flex;
            gap: 5px;
            margin-left: 20px;
        }

        .lang-btn {
            background: #2a2f36;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }

        .lang-btn.active {
            background: #a42323;
            border-color: #ffb400;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav {
            display: flex;
            align-items: center;
        }
    </style>
</head>

        const container = document.getElementById('heroes-container');
        const buttons = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('hero-search');

        const attrIcons = {
            str: "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_strength.png",
            agi: "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_agility.png",
            int: "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_intelligence.png",
            uni: "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/icons/hero_universal.png"
        };

        let currentType = 'all';
        let currentLang = 'uk'; // Базова мова сторінки

        function renderHeroes() {
            const query = searchInput.value.toLowerCase().trim();
            container.innerHTML = '';

            let visibleIndex = 0;

            heroes.forEach(h => {
                const matchesType = currentType === 'all' || h.t === currentType;
                
                // Розумний пошук: шукає одночасно і за англійською, і за українською назвою
                const matchesSearch = h.n.toLowerCase().includes(query) || h.ua.toLowerCase().includes(query);

                if (matchesType && matchesSearch) {
                    const heroLink = document.createElement('a');
                    heroLink.href = `https://www.dota2.com/hero/${h.i}`;
                    heroLink.target = "_blank";
                    heroLink.className = 'hero-link';
                    
                    heroLink.style.animationDelay = `${visibleIndex * 0.02}s`;
                    visibleIndex++;

                    // Визначаємо, яку назву виводити на картку залежно від мови
                    const displayName = currentLang === 'uk' ? h.ua : h.n;

                    heroLink.innerHTML = `
                        <div class="hero-card-item">
                            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${h.i}.png" class="hero-portrait" alt="${displayName}">
                            <div class="hero-info">
                                <img src="${attrIcons[h.t]}" class="attr-icon" title="${h.t}">
                                <div class="hero-name">${displayName}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(heroLink);
                }
            });
        }

        // Функція зміни мови
        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('page-html').setAttribute('lang', lang);

            if (lang === 'uk') {
                document.getElementById('btn-ua').classList.add('active');
                document.getElementById('btn-en').classList.remove('active');
                searchInput.placeholder = "Пошук героя...";
            } else {
                document.getElementById('btn-en').classList.add('active');
                document.getElementById('btn-ua').classList.remove('active');
                searchInput.placeholder = "Search hero...";
            }

            // Переклад статичних елементів інтерфейсу
            const elements = document.querySelectorAll('[data-ua]');
            elements.forEach(el => {
                el.innerHTML = lang === 'uk' ? el.getAttribute('data-ua') : el.getAttribute('data-en');
            });

            // Перемальовуємо сітку героїв з новими іменами
            renderHeroes();
        }

        // Обробники для кнопок фільтрації атрибутів
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                renderHeroes();
            });
        });

        searchInput.addEventListener('input', renderHeroes);

        // Початковий рендер
        renderHeroes();
    </script>
